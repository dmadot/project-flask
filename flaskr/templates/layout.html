<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <!-- Title & Description -->
        <meta name="description" 
              content="Free, browser-based NMR processing. 
              Upload a Bruker dataset, apply phase correction, detect peaks, 
              integrate, and export as SVG. No installation, no data stored.">
        <title>{% block title %}{% endblock %}</title>
        <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='figures/cake2-fill.png') }}">

        <!-- Open Graph -->
        <meta property="og:type" content="website">
        <meta property="og:url" content="https://plotpie.dev/">
        <meta property="og:title" content="PlotPie — Process NMR spectra in your browser">
        <meta property="og:description" content="Free, browser-based NMR processing. Upload a Bruker dataset and export your spectrum as SVG.">
        <meta property="og:image" content="{{ url_for('static', filename='figures/furfurylamine_freq_1_.png') }}">
        <meta property="og:image:width" content="1200">
        <meta property="og:image:height" content="630">
        <meta property="og:site_name" content="PlotPie">

        <!-- Twitter -->
        <meta name="twitter:card" content="summary_large_image">
        <meta name="twitter:title" content="PlotPie — Process NMR spectra in your browser">
        <meta name="twitter:description" content="Free, browser-based NMR processing.">
        <meta name="twitter:image" content="{{ url_for('static', filename='figures/furfurylamine_freq_1_.png') }}">

        <!-- Canonical URL -->
        <link rel="canonical" href="https://plotpie.dev/">

        <!-- Stylesheets -->
        <link rel="stylesheet" href="{{ url_for('static', filename='vendor/bootstrap/css/bootstrap.min.css') }}">
        <link rel="stylesheet" href="{{ url_for('static', filename='vendor/bootstrap-icons/bootstrap-icons.min.css') }}">
    </head>
    <body class="d-flex flex-column min-vh-100">
        <nav class="navbar navbar-expand-lg bg-body-tertiary sticky-top">
            <div class="container">
                <a class="navbar-brand" href="{{ url_for('main.index') }}"><i class="bi bi-cake2-fill"></i> PlotPie</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link {% if request.endpoint == 'about.index' %}active{% endif %}" href="{{ url_for('about.index') }}">About</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.endpoint == 'learn.index' %}active{% endif %}" href="{{ url_for('learn.index') }}">Learn</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.endpoint == 'nmr.index' %}active{% endif %}" href="{{ url_for('nmr.index') }}">NMR</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.endpoint == 'plot.index' %}active{% endif %}" href="{{ url_for('plot.index') }}">Plot</a>
                        </li>
                    </ul>
                    {% if g.user %}
                        <form class="d-flex" action="{{ url_for('auth.close_session', next=request.path) }}" method="post">
                            <button class="btn btn-primary" type="submit">Close session</button>
                        </form>
                    {% elif not g.user %}
                        <form class="d-flex" action="{{ url_for('auth.open_session', next=request.path) }}" method="post">
                            <button class="btn btn-primary" type="submit">Open session</button>
                        </form>
                    {% endif %}
                </div>
            </div>
        </nav>
        <main class="container flex-grow-1 mt-4">
            {% block body %}{% endblock %}
        </main>
        <footer class="text-center text-muted small mt-5 pt-4 border-top">
            <p class="mb-1">
                Built with open-source software · 
                <a href="https://github.com/dmadot/project-flask/blob/master/THIRD_PARTY_LICENSES.md" class="text-muted">Third-party licenses</a>
            </p>
            <p class="mb-1">
                Last updated May 2026 ·
                <a href="https://github.com/dmadot/project-flask/blob/master/LICENSE" class="text-muted">MIT licensed</a>
            </p>
            <p class="mb-0">
                © Dimitri Karpov · 
                <a href="https://github.com/dmadot/project-flask" class="text-muted">Source on GitHub</a>
            </p>
        </footer>
        <script src="{{ url_for('static', filename='vendor/bootstrap/js/bootstrap.bundle.min.js') }}"></script>
    </body>
</html>
