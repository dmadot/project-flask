<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>{% block title %}{% endblock %} - PlotPie</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    </head>
    <body class="d-flex flex-column min-vh-100">
        <nav class="navbar navbar-expand-lg bg-body-tertiary sticky-top">
            <div class="container">
                <a class="navbar-brand" href="{{ url_for('main.index') }}">PlotPie</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link {% if request.endpoint == 'about.index' %}active{% endif %}" href="{{ url_for('about.index') }}">About</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.endpoint == 'learn.index' %}active{% endif %}" href="{{ url_for('learn.index') }}">Learn</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.endpoint == 'nmr.index' %}active{% endif %}" href="{{ url_for('nmr.index') }}">NMR</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.endpoint == 'plot.index' %}active{% endif %}" href="{{ url_for('plot.index') }}">Plot</a>
                        </li>
                    </ul>
                    {% if g.user %}
                        <form class="d-flex" action="{{ url_for('auth.close_session', next=request.path) }}" method="post">
                            <button class="btn btn-primary" type="submit">Close session</button>
                        </form>
                    {% elif not g.user %}
                        <form class="d-flex" action="{{ url_for('auth.open_session', next=request.path) }}" method="post">
                            <button class="btn btn-primary" type="submit">Open session</button>
                        </form>
                    {% endif %}
                </div>
            </div>
        </nav>
        <main class="container flex-grow-1 mt-4">
            {% block body %}{% endblock %}
        </main>
        <footer class="text-center text-muted small mt-5 pt-4 border-top">
            <p class="mb-1">
                Built with open-source software · <a href="https://github.com/dmadot/project-flask/blob/master/THIRD_PARTY_LICENSES.md" class="text-muted">Third-party licenses</a>
            </p>
            <p class="mb-1">
                v0.1.0 · Last updated May 2026 · MIT licensed
                <a href="https://github.com/dmadot/project-flask/blob/master/LICENSE" class="text-muted">MIT licensed</a>
            </p>
            <p class="mb-0">
                <a href="https://github.com/dmadot/project-flask" class="text-muted">Source on GitHub</a> · © Dimitri Karpov
            </p>
        </footer>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    </body>
</html>
