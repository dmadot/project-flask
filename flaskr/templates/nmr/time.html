{% extends "layout.html" %}

{% block body %}

    <h1>
        Time domain
        <form action="{{ url_for('nmr.freq', filename=filename) }}" method="get">
            <button class="button" type="submit">
                <svg width="20px" height="20px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M2 12H9.5M22 12H14.5" stroke="#1C274C" stroke-width="1.5" stroke-linecap="round"/>
                    <path d="M20.0002 15.6843C20.0002 19 17.7345 22 16.0002 22C14.7427 22 13.6725 21.0299 12.9682 18.9999M4.14404 8.31567C4.14404 4.99988 6.40978 1.99988 8.14404 1.99988C10.4128 1.99988 12.0723 5.15794 12.0723 12C12.0723 13.0933 12.1146 14.0926 12.1951 14.9999" stroke="#1C274C" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
            </button>
        </form>
        <form action="{{ url_for('nmr.time_download', filename=filename) }}" method="get">
            <button class="button" type="submit">
                <svg width="20px" height="20px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M3 15C3 17.8284 3 19.2426 3.87868 20.1213C4.75736 21 6.17157 21 9 21H15C17.8284 21 19.2426 21 20.1213 20.1213C21 19.2426 21 17.8284 21 15" stroke="#1C274C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M12 3V16M12 16L16 11.625M12 16L8 11.625" stroke="#1C274C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </form>   
    </h1>

    <div class="split-layout">
        <div>
            <img alt="Time domain NMR" class="plot" src="data:image/svg+xml;base64,{{ figure }}">
        </div>
        <div>
            <table class="table-settings">
                <form action="{{ url_for('nmr.time_axis', filename=filename) }}" method="post">
                    <input type="submit" hidden>
                    <tr>
                        <td>X-Min:</td>
                        <td><input type="number" name="xmin" value="{{ settings['time_axis']['xmin'] }}" step="any"></td>
                        <td>X-Max:</td>
                        <td><input type="number" name="xmax" value="{{ settings['time_axis']['xmax'] }}" step="any"></td>
                    </tr>
                    <tr>
                        <td>Y-Min:</td>
                        <td><input type="number" name="ymin" value="{{ settings['time_axis']['ymin'] }}" step="any"></td>
                        <td>Y-Max:</td>
                        <td><input type="number" name="ymax" value="{{ settings['time_axis']['ymax'] }}" step="any"></td>
                    </tr>
                </form>
            </table>
        </div>
    </div>
    



{% endblock %}
